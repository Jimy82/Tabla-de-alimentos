<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Language" content="es">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Jaime Frutos Perez-Surio">
  <meta name="description" content="DiabyteBase - Tabla de alimentos para diabetes, hidratos de carbono e índice glucémico.">
  <title>DiabyteBase | Tabla de alimentos</title>

  <link rel="icon" type="image/png" href="./imagenes/logo-diabytebase.png">
  <link rel="stylesheet" type="text/css" href="alimentos.css">
</head>
<body>

  <header class="site-header">
    <div class="brand">
      <img
        src="./imagenes/logo-diabytebase.png"
        alt="Logotipo de DiabyteBase"
        class="site-logo"
      >
      <div class="brand-text">
        <h1>DiabyteBase</h1>
        <p>Tabla de alimentos</p>
      </div>
    </div>
  </header>

  <div class="top-controls">
    <input type="text" id="search-input" placeholder="Buscar alimento">
    <input type="number" id="grams-input" placeholder="Gramos">
    <button id="theme-toggle" type="button">Modo claro</button>
    <button
      class="stripe-button"
      type="button"
      onclick="window.open('https://ko-fi.com/diabytebase', '_blank')"
    >
      Donativo
    </button>
  </div>

  <div class="top-content">
    <div id="result-container"></div>

    <div class="table-wrapper">
      <table id="food-table">
        <thead>
          <tr>
            <th class="sortable" data-column="tipo">Tipo</th>
            <th class="sortable" data-column="nombre">Nombre</th>
            <th class="sortable" data-column="hidratos">Gramos por ración</th>
            <th class="sortable" data-column="glucemico">Índice glucémico</th>
            <th>URL</th>
            <th>Imagen</th>
          </tr>
        </thead>
        <tbody>
          <!-- Aquí se agregarán las filas dinámicamente -->
        </tbody>
      </table>
    </div>
  </div>

  <footer>
    <p>© 2026 Jaime Frutos Perez-Surio. Todos los derechos reservados.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
